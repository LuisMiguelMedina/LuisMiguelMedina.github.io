<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <!-- Lumivox night mark on the brand's dark background. Square + circle-crop safe
       (all content inside the inscribed circle) for use as a profile/avatar icon. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#1d1836"/>
      <stop offset="58%" stop-color="#110f20"/>
      <stop offset="100%" stop-color="#0a0912"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="54%" r="42%">
      <stop offset="0%" stop-color="#FFE500" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFE500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <circle cx="20" cy="22" r="1.6" fill="#F4EFE6" opacity="0.7"/>
  <circle cx="82" cy="28" r="2"   fill="#F4EFE6" opacity="0.75"/>
  <circle cx="76" cy="74" r="1.5" fill="#F4EFE6" opacity="0.6"/>
  <circle cx="24" cy="68" r="1.4" fill="#F4EFE6" opacity="0.6"/>
  <circle cx="50" cy="52" r="42" fill="url(#glow)"/>
  <g transform="translate(50 50) scale(1.12) translate(-50 -50)">
    <path d="M30 30 L50 78 L70 30" fill="none" stroke="#FFE500" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="34" r="8" fill="#FF007F"/>
  </g>
</svg>
