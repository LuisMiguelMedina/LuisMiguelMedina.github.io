<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A789A" />
      <stop offset="60%" stop-color="#3B5673" />
      <stop offset="100%" stop-color="#22364A" />
    </linearGradient>
    <radialGradient id="lm-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2D585" stop-opacity="0.95" />
      <stop offset="80%" stop-color="#E8B848" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#E8B848" stop-opacity="0" />
    </radialGradient>
    <filter id="lm-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" />
      <feColorMatrix values="0 0 0 0 0.07  0 0 0 0 0.08  0 0 0 0 0.12  0 0 0 0.18 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#lm-bg)" />
  <circle cx="200" cy="180" r="160" fill="url(#lm-sun)" />
  <!-- Brushed band suggesting horizon / scroll edge -->
  <path d="M 0 360 Q 100 340 200 360 T 400 360 L 400 500 L 0 500 Z" fill="#2E4858" opacity="0.55" />
  <path d="M 0 360 Q 100 340 200 360 T 400 360" stroke="#E8B848" stroke-width="2" fill="none" opacity="0.55" />
  <!-- Initials -->
  <text x="200" y="430" font-family="Georgia, serif" font-size="56" font-style="italic" font-weight="600"
        fill="#F2EAD6" text-anchor="middle" letter-spacing="-1">Luis.M</text>
  <text x="200" y="465" font-family="'Manrope', sans-serif" font-size="9" letter-spacing="5"
        fill="#F2EAD6" fill-opacity="0.55" text-anchor="middle">PLACEHOLDER · LUVINOX</text>
  <rect width="400" height="500" filter="url(#lm-grain)" />
</svg>
