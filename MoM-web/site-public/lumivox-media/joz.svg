<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="jz-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A292" />
      <stop offset="55%" stop-color="#D17865" />
      <stop offset="100%" stop-color="#A85544" />
    </linearGradient>
    <radialGradient id="jz-sun" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F2EAD6" stop-opacity="0.95" />
      <stop offset="75%" stop-color="#E8B848" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#E8B848" stop-opacity="0" />
    </radialGradient>
    <filter id="jz-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" />
      <feColorMatrix values="0 0 0 0 0.12  0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0.16 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#jz-bg)" />
  <circle cx="200" cy="200" r="170" fill="url(#jz-sun)" />
  <!-- Brushed band -->
  <path d="M 0 360 Q 130 348 200 364 T 400 354 L 400 500 L 0 500 Z" fill="#7A3B2E" opacity="0.55" />
  <path d="M 0 360 Q 130 348 200 364 T 400 354" stroke="#F2D585" stroke-width="2" fill="none" opacity="0.65" />
  <!-- Name -->
  <text x="200" y="438" font-family="Georgia, serif" font-size="70" font-style="italic" font-weight="600"
        fill="#F2EAD6" text-anchor="middle" letter-spacing="-1">Joz</text>
  <text x="200" y="468" font-family="'Manrope', sans-serif" font-size="9" letter-spacing="5"
        fill="#F2EAD6" fill-opacity="0.6" text-anchor="middle">PLACEHOLDER · LUVINOX</text>
  <rect width="400" height="500" filter="url(#jz-grain)" />
</svg>
